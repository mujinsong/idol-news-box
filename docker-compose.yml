version: '3.8'

services:
  postgresql:
    image: bitnami/postgresql:latest
    container_name: weibo-spider-db
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres123
      - POSTGRESQL_DATABASE=weibo_spider
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql

  rabbitmq:
    image: rabbitmq:latest
    container_name: weibo-spider-mq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  rabbitmq_data:
